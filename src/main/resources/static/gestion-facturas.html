<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grid | Gestión de Facturas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f8; color: #1e293b; }
        .app-wrapper { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
            color: #e2e8f0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 8px 0 20px rgba(0,0,0,0.08);
            z-index: 100;
        }
        .sidebar-header { padding: 28px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 24px; }
        .sidebar-header h2 { font-size: 1.7rem; font-weight: 700; background: linear-gradient(135deg, #38bdf8, #818cf8); background-clip: text; -webkit-background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 10px; }
        .sidebar-header h2 i { color: #38bdf8; }
        .nav-links { flex: 1; padding: 0 16px; }
        .nav-links a { display: flex; align-items: center; gap: 14px; padding: 12px 18px; margin: 6px 0; border-radius: 16px; font-weight: 500; color: #cbd5e6; text-decoration: none; transition: 0.2s; font-size: 0.95rem; }
        .nav-links a i { width: 24px; font-size: 1.2rem; text-align: center; }
        .nav-links a:hover { background: rgba(56,189,248,0.15); color: white; transform: translateX(4px); }
        .nav-links a.active { background: linear-gradient(95deg,#1e2a4a,#0f172a); color: #38bdf8; border-left: 3px solid #38bdf8; }
        .sidebar-footer { padding: 20px 24px 30px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.75rem; color: #7c8ba0; }
        .logout-sidebar-btn { background: transparent; border: 1px solid #6ee7b7; color: white; width: 100%; padding: 8px; border-radius: 40px; margin-bottom: 12px; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logout-sidebar-btn:hover { background: rgba(110,231,183,0.2); }
        .main-content { flex: 1; margin-left: 280px; padding: 28px 36px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 32px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .page-title p { color: #5b6e8c; font-size: 0.9rem; margin-top: 6px; }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .date-badge { background: white; padding: 8px 18px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; color: #2c3e66; border: 1px solid #e9eef3; }
        .card { background: white; border-radius: 28px; padding: 1.5rem; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .filter-bar { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 25px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-weight: 600; font-size: 0.8rem; color: #475569; }
        select, input { padding: 8px 16px; border-radius: 40px; border: 1px solid #cbd5e1; font-family: 'Inter', sans-serif; background: white; }
        button { background: #2c3e50; border: none; color: white; padding: 8px 18px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-weight: 500; transition: 0.2s; }
        button.detail { background: #3b82f6; }
        button.delete { background: #ef4444; }
        button:hover { opacity: 0.85; transform: scale(0.98); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; color: #0f172a; }
        .actions { display: flex; gap: 8px; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; flex-direction: row; flex-wrap: wrap; }
            .sidebar-header, .sidebar-footer { display: none; }
            .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
            .main-content { margin-left: 0; padding: 20px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
<script>
    // Verificar autenticación (solo admin)
    const token = localStorage.getItem('authToken');
    const rol = localStorage.getItem('userRol');
    if (!token || rol !== 'admin') {
        alert('Acceso no autorizado. Debes iniciar sesión como administrador.');
        window.location.href = 'index.html';
    }
</script>
<div class="app-wrapper">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Gestión de Facturas</h1>
                <p><i class="fas fa-file-invoice-dollar"></i> Historial completo de facturas generadas</p>
            </div>
            <div class="date-badge" id="currentDate"></div>
        </div>

        <div class="card">
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Filtrar por usuario</label>
                    <select id="filtroUsuario">
                        <option value="">Todos los usuarios</option>
                    </select>
                </div>
                <button id="btnFiltrar" class="detail"><i class="fas fa-filter"></i> Filtrar</button>
                <button id="btnLimpiarFiltro" class="detail"><i class="fas fa-undo-alt"></i> Limpiar filtro</button>
            </div>

            <div style="overflow-x: auto;">
                <table id="tablaFacturas">
                    <thead>
                        <tr>
                            <th>ID Factura</th>
                            <th>Usuario</th>
                            <th>Consumo (kWh)</th>
                            <th>Total ($)</th>
                            <th>Fecha emisión</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyFacturas">
                        <tr><td colspan="6" style="text-align:center;">Cargando facturas...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    // === Fecha actual ===
    function updateDate() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        let formatted = now.toLocaleDateString('es-ES', options);
        formatted = formatted.charAt(0).toUpperCase() + formatted.slice(1);
        document.getElementById('currentDate').innerHTML = `<i class="far fa-calendar-alt"></i> ${formatted}`;
    }
    updateDate();
    setInterval(updateDate, 60000);

    // === Cargar menú lateral dinámico ===
    fetch('/menu.html?t=' + Date.now())
        .then(response => response.text())
        .then(data => {
            document.getElementById('sidebar-container').innerHTML = data;
            const currentPage = window.location.pathname.split('/').pop().replace('.html', '');
            const activeLink = document.querySelector(`#sidebar-container a[data-page="${currentPage}"]`);
            if (activeLink) activeLink.classList.add('active');
            const logoutBtn = document.getElementById('logoutSidebarBtnGlobal');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('userRol');
                    sessionStorage.removeItem('rolSeleccionado');
                    window.location.href = 'index.html';
                });
            }
        })
        .catch(error => console.error('Error cargando menú:', error));

    // === Variables globales ===
    let usuariosMap = new Map();  // id -> nombre
    let facturasActuales = [];

    // === 1. Cargar lista de usuarios para el filtro ===
    async function cargarUsuariosParaFiltro() {
        try {
            const res = await fetch('/usuarios');
            if (!res.ok) throw new Error('Error al obtener usuarios');
            const usuarios = await res.json();
            usuariosMap.clear();
            const select = document.getElementById('filtroUsuario');
            select.innerHTML = '<option value="">Todos los usuarios</option>';
            usuarios.forEach(u => {
                usuariosMap.set(u.id, u.nombre);
                select.innerHTML += `<option value="${u.id}">${u.nombre}</option>`;
            });
        } catch (error) {
            console.error('Error cargando usuarios:', error);
        }
    }

    // === 2. Cargar facturas (opcionalmente filtradas por usuarioId) ===
    async function cargarFacturas(usuarioId = '') {
        const tbody = document.getElementById('tbodyFacturas');
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Cargando facturas...</td></tr>';
        try {
            let url = '/facturas';
            if (usuarioId && usuarioId.trim() !== '') {
                url += `?usuarioId=${usuarioId}`;
            }
            const res = await fetch(url);
            if (!res.ok) throw new Error('Error al obtener facturas');
            const facturas = await res.json();
            facturasActuales = facturas;
            renderizarTablaFacturas(facturas);
        } catch (error) {
            console.error(error);
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#ef4444;">Error al cargar facturas</td></tr>';
        }
    }

    // === 3. Renderizar la tabla de facturas ===
    function renderizarTablaFacturas(facturas) {
        const tbody = document.getElementById('tbodyFacturas');
        if (!facturas.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No hay facturas registradas</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        facturas.forEach(f => {
            const row = tbody.insertRow();
            // ID factura
            row.insertCell(0).innerText = f.id || f._id || '—';
            // Usuario (nombre)
            const nombreUsuario = usuariosMap.get(f.idUsuario) || f.nombreUsuario || f.idUsuario || 'Desconocido';
            row.insertCell(1).innerText = nombreUsuario;
            // Consumo
            row.insertCell(2).innerText = f.consumo?.toFixed(2) || '0';
            // Total
            row.insertCell(3).innerText = `$${ (f.total || 0).toLocaleString('es-CO') }`;
            // Fecha emisión
            const fecha = f.fechaEmision ? new Date(f.fechaEmision).toLocaleDateString('es-ES') : '—';
            row.insertCell(4).innerText = fecha;
            // Acciones
            const accionesCell = row.insertCell(5);
            accionesCell.className = 'actions';
            
            // Botón Ver Detalle
            const btnDetalle = document.createElement('button');
            btnDetalle.className = 'detail';
            btnDetalle.innerHTML = '<i class="fas fa-eye"></i>';
            btnDetalle.title = 'Ver detalle';
            btnDetalle.onclick = () => verDetalleFactura(f);
            
            // Botón Eliminar
            const btnEliminar = document.createElement('button');
            btnEliminar.className = 'delete';
            btnEliminar.innerHTML = '<i class="fas fa-trash"></i>';
            btnEliminar.title = 'Eliminar factura';
            btnEliminar.onclick = () => eliminarFactura(f.id || f._id);
            
            accionesCell.appendChild(btnDetalle);
            accionesCell.appendChild(btnEliminar);
        });
    }

    // === 4. Ver detalle de factura (modal con alerta mejorable) ===
    function verDetalleFactura(factura) {
        const nombre = usuariosMap.get(factura.idUsuario) || factura.nombreUsuario || factura.idUsuario;
        const detalles = `
            🧾 FACTURA N° ${factura.id || factura._id}
            ─────────────────────────
            Usuario: ${nombre}
            Consumo: ${factura.consumo} kWh
            Tarifa base: $${(factura.tarifaBase || 0).toLocaleString('es-CO')}
            Tipo facturación: ${factura.tipoFacturacion || '—'}
            Fuente energía: ${factura.fuenteEnergia || '—'}
            ─────────────────────────
            Subtotal: $${(factura.subtotal || 0).toLocaleString('es-CO')}
            Impuestos: $${(factura.impuestos || 0).toLocaleString('es-CO')}
            Descuento: $${(factura.descuento || 0).toLocaleString('es-CO')}
            TOTAL: $${(factura.total || 0).toLocaleString('es-CO')}
            Fecha: ${factura.fechaEmision ? new Date(factura.fechaEmision).toLocaleString() : '—'}
        `;
        alert(detalles);
        // Opcional: se puede reemplazar por un modal más elegante.
    }

    // === 5. Eliminar factura ===
    async function eliminarFactura(id) {
        if (!confirm('¿Estás seguro de eliminar esta factura? Esta acción no se puede deshacer.')) return;
        try {
            const res = await fetch(`/facturas/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert('Factura eliminada correctamente');
                // Recargar la lista con el filtro actual
                const usuarioId = document.getElementById('filtroUsuario').value;
                cargarFacturas(usuarioId);
            } else {
                alert('Error al eliminar la factura');
            }
        } catch (error) {
            console.error(error);
            alert('Error de conexión');
        }
    }

    // === 6. Eventos del filtro ===
    document.getElementById('btnFiltrar').addEventListener('click', () => {
        const usuarioId = document.getElementById('filtroUsuario').value;
        cargarFacturas(usuarioId);
    });
    document.getElementById('btnLimpiarFiltro').addEventListener('click', () => {
        document.getElementById('filtroUsuario').value = '';
        cargarFacturas('');
    });

    // === Inicialización ===
    cargarUsuariosParaFiltro().then(() => cargarFacturas(''));
</script>
</body>
</html>
