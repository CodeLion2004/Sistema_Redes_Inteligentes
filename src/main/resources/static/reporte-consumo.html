<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Smart Grid | Reporte de Consumo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f8; color: #1e293b; }
        .app-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: linear-gradient(180deg,#0f172a 0%,#111827 100%); color: #e2e8f0; position: fixed; top: 0; left: 0; bottom: 0; display: flex; flex-direction: column; overflow-y: auto; box-shadow: 8px 0 20px rgba(0,0,0,0.08); }
        .sidebar-header { padding: 28px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 24px; }
        .sidebar-header h2 { font-size: 1.7rem; font-weight: 700; background: linear-gradient(135deg,#38bdf8,#818cf8); background-clip: text; -webkit-background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 10px; }
        .sidebar-header h2 i { color: #38bdf8; }
        .nav-links { flex: 1; padding: 0 16px; }
        .nav-links a { display: flex; align-items: center; gap: 14px; padding: 12px 18px; margin: 6px 0; border-radius: 16px; font-weight: 500; color: #cbd5e6; text-decoration: none; transition: 0.2s; font-size: 0.95rem; }
        .nav-links a i { width: 24px; font-size: 1.2rem; text-align: center; }
        .nav-links a:hover { background: rgba(56,189,248,0.15); color: white; transform: translateX(4px); }
        .nav-links a.active { background: linear-gradient(95deg,#1e2a4a,#0f172a); color: #38bdf8; border-left: 3px solid #38bdf8; }
        .sidebar-footer { padding: 20px 24px 30px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.75rem; color: #7c8ba0; }
        .logout-sidebar-btn { background: transparent; border: 1px solid #6ee7b7; color: white; width: 100%; padding: 8px; border-radius: 40px; margin-bottom: 12px; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logout-sidebar-btn:hover { background: rgba(110,231,183,0.2); }
        .main-content { flex: 1; margin-left: 280px; padding: 28px 36px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 32px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .page-title p { color: #5b6e8c; font-size: 0.9rem; margin-top: 6px; }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .refresh-btn { background: white; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 40px; font-weight: 500; color: #1e293b; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .refresh-btn:hover { background: #f8fafc; transform: scale(0.98); }
        .date-badge { background: white; padding: 8px 18px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; color: #2c3e66; border: 1px solid #e9eef3; }
        .chart-section, .umbral-section { background: white; border-radius: 28px; padding: 1.5rem; margin-top: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .footer-note { margin-top: 48px; text-align: center; font-size: 0.75rem; color: #7e8b9f; border-top: 1px solid #e2edf7; padding-top: 24px; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; flex-direction: row; flex-wrap: wrap; }
            .sidebar-header, .sidebar-footer { display: none; }
            .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>
<script>
    const token = localStorage.getItem('authToken');
    const rol = localStorage.getItem('userRol');
    if (!token || rol !== 'admin') {
        alert('Acceso no autorizado');
        window.location.href = 'index.html';
    }

    // Cargar menú dinámico
    fetch('/menu.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('sidebar-container').innerHTML = data;
            const currentPage = window.location.pathname.split('/').pop().replace('.html', '');
            const activeLink = document.querySelector(`#sidebar-container a[data-page="${currentPage}"]`);
            if (activeLink) activeLink.classList.add('active');
            const logoutBtnGlobal = document.getElementById('logoutSidebarBtnGlobal');
            if (logoutBtnGlobal) {
                logoutBtnGlobal.addEventListener('click', () => {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('userRol');
                    sessionStorage.removeItem('rolSeleccionado');
                    window.location.href = 'index.html';
                });
            }
        })
        .catch(error => console.error('Error cargando el menú:', error));
</script>

<div class="app-wrapper">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="top-bar">
            <div class="page-title"><h1>Reporte de Consumo</h1><p><i class="fas fa-chart-line"></i> Tendencias y alertas de consumo energético</p></div>
            <div class="header-actions">
                <div class="date-badge" id="currentDate"></div>
                <button class="refresh-btn" id="refreshTopBtn"><i class="fas fa-sync-alt"></i> Actualizar gráfico</button>
                <button class="refresh-btn" id="logoutBtn" style="background:#fee2e2; color:#b91c1c;"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>
        </div>
        <div class="chart-section">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:20px;">
                <h2><i class="fas fa-chart-line"></i> Tendencia de consumo energético</h2>
                <div style="display:flex; gap:12px;">
                    <select id="periodoSelector" class="refresh-btn" style="background:#f8fafc;"><option value="dia">Últimos 7 días</option><option value="semana">Última semana</option></select>
                </div>
            </div>
            <canvas id="consumoChart" width="400" height="200" style="max-height:300px; width:100%;"></canvas>
        </div>
        <div class="umbral-section">
            <h3><i class="fas fa-exclamation-triangle"></i> Alerta por umbral de consumo</h3>
            <div style="display:flex; gap:20px; align-items:flex-end; flex-wrap:wrap;">
                <div><label>Umbral máximo (kWh):</label><input type="number" id="umbralInput" step="100" value="5000" style="padding:8px; border-radius:20px; border:1px solid #ccc;"></div>
                <button id="guardarUmbralBtn" class="refresh-btn">Guardar umbral</button>
                <div id="alertaUmbral" style="background:#fee2e2; padding:8px 18px; border-radius:40px; display:none;"><i class="fas fa-bell"></i> <span id="alertaMensaje"></span></div>
            </div>
        </div>
        <div class="footer-note"><i class="fas fa-database"></i> Datos en tiempo real desde API REST</div>
    </main>
</div>

<script>
    function updateDate() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        let formatted = now.toLocaleDateString('es-ES', options);
        formatted = formatted.charAt(0).toUpperCase() + formatted.slice(1);
        document.getElementById('currentDate').innerHTML = `<i class="far fa-calendar-alt"></i> ${formatted}`;
    }
    let consumoChart = null;
    let umbralActual = localStorage.getItem('umbralConsumo') ? parseFloat(localStorage.getItem('umbralConsumo')) : 5000;
    document.getElementById('umbralInput').value = umbralActual;
    async function cargarTendencias(periodo) {
        try {
            const response = await fetch(`/api/consumo/tendencias?periodo=${periodo}`);
            if (!response.ok) throw new Error('Error al cargar tendencias');
            const data = await response.json();
            actualizarGrafico(data.fechas, data.valores);
            verificarUmbral(data.consumoTotal);
        } catch (error) {
            console.error(error);
            mostrarAlertaUmbral('Error al cargar tendencias', true);
        }
    }
    function actualizarGrafico(fechas, valores) {
        const ctx = document.getElementById('consumoChart').getContext('2d');
        if (consumoChart) consumoChart.destroy();
        consumoChart = new Chart(ctx, {
            type: 'line',
            data: { labels: fechas, datasets: [{ label: 'Consumo (kWh)', data: valores, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', tension: 0.3, fill: true }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} kWh` } } } }
        });
    }
    function verificarUmbral(consumoTotal) {
        if (consumoTotal > umbralActual) {
            mostrarAlertaUmbral(`⚠️ El consumo total (${consumoTotal.toLocaleString()} kWh) supera el umbral de ${umbralActual.toLocaleString()} kWh`);
        } else { ocultarAlertaUmbral(); }
    }
    function mostrarAlertaUmbral(mensaje, esError = false) {
        const div = document.getElementById('alertaUmbral');
        const span = document.getElementById('alertaMensaje');
        span.innerText = mensaje;
        div.style.display = 'flex';
        div.style.background = esError ? '#fee2e2' : '#fff3cd';
        div.style.color = esError ? '#b91c1c' : '#856404';
    }
    function ocultarAlertaUmbral() { document.getElementById('alertaUmbral').style.display = 'none'; }
    function logout() {
        localStorage.removeItem('authToken');
        localStorage.removeItem('userRol');
        sessionStorage.removeItem('rolSeleccionado');
        window.location.href = 'index.html';
    }
    document.addEventListener('DOMContentLoaded', () => {
        updateDate();
        cargarTendencias('dia');
        document.getElementById('refreshTopBtn').addEventListener('click', () => { cargarTendencias(document.getElementById('periodoSelector').value); });
        document.getElementById('periodoSelector').addEventListener('change', () => { cargarTendencias(document.getElementById('periodoSelector').value); });
        document.getElementById('guardarUmbralBtn').addEventListener('click', () => {
            const nuevo = parseFloat(document.getElementById('umbralInput').value);
            if (!isNaN(nuevo) && nuevo > 0) {
                umbralActual = nuevo;
                localStorage.setItem('umbralConsumo', umbralActual);
                alert(`Umbral guardado: ${umbralActual} kWh`);
                cargarTendencias(document.getElementById('periodoSelector').value);
            } else alert('Valor inválido');
        });
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) logoutBtn.addEventListener('click', logout);
        setInterval(updateDate, 60000);
        setInterval(() => { cargarTendencias(document.getElementById('periodoSelector').value); }, 60000);
    });
</script>
</body>
</html>
