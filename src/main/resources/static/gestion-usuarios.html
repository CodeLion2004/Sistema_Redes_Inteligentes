<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grid | Gestión de Usuarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f8; color: #1e293b; }
        .app-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: linear-gradient(180deg, #0f172a 0%, #111827 100%); color: #e2e8f0; position: fixed; top: 0; left: 0; bottom: 0; display: flex; flex-direction: column; overflow-y: auto; box-shadow: 8px 0 20px rgba(0,0,0,0.08); }
        .sidebar-header { padding: 28px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 24px; }
        .sidebar-header h2 { font-size: 1.7rem; font-weight: 700; background: linear-gradient(135deg, #38bdf8, #818cf8); background-clip: text; -webkit-background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 10px; }
        .sidebar-header h2 i { color: #38bdf8; }
        .nav-links { flex: 1; padding: 0 16px; }
        .nav-links a { display: flex; align-items: center; gap: 14px; padding: 12px 18px; margin: 6px 0; border-radius: 16px; font-weight: 500; color: #cbd5e6; text-decoration: none; transition: 0.2s; font-size: 0.95rem; }
        .nav-links a i { width: 24px; font-size: 1.2rem; text-align: center; }
        .nav-links a:hover { background: rgba(56,189,248,0.15); color: white; transform: translateX(4px); }
        .nav-links a.active { background: linear-gradient(95deg,#1e2a4a,#0f172a); color: #38bdf8; border-left: 3px solid #38bdf8; }
        .sidebar-footer { padding: 20px 24px 30px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.75rem; color: #7c8ba0; }
        .logout-sidebar-btn { background: transparent; border: 1px solid #6ee7b7; color: white; width: 100%; padding: 8px; border-radius: 40px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .main-content { flex: 1; margin-left: 280px; padding: 28px 36px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 32px; }
        .page-title h1 { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .page-title p { color: #5b6e8c; font-size: 0.9rem; margin-top: 6px; }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .date-badge { background: white; padding: 8px 18px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; color: #2c3e66; border: 1px solid #e9eef3; }
        .card { background: white; border-radius: 28px; padding: 1.5rem; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; }
        button { background: #2c3e50; border: none; color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; margin-right: 5px; }
        button.edit { background: #3b82f6; }
        button.delete { background: #ef4444; }
        button.add { background: #10b981; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 500; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #cbd5e1; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 28px; padding: 24px; width: 500px; max-width: 90%; }
        @media (max-width: 768px) { .sidebar { width: 100%; position: relative; flex-direction: row; flex-wrap: wrap; } .sidebar-header, .sidebar-footer { display: none; } .nav-links { display: flex; gap: 8px; flex-wrap: wrap; } .main-content { margin-left: 0; padding: 20px; } }
    </style>
</head>
<body>
<script>
    const token = localStorage.getItem('authToken');
    const rol = localStorage.getItem('userRol');
    if (!token || rol !== 'admin') { alert('Acceso no autorizado'); window.location.href = 'index.html'; }

    fetch('/menu.html?t='+Date.now()).then(r=>r.text()).then(data=>{
        document.getElementById('sidebar-container').innerHTML = data;
        const currentPage = window.location.pathname.split('/').pop().replace('.html','');
        const activeLink = document.querySelector(`#sidebar-container a[data-page="${currentPage}"]`);
        if(activeLink) activeLink.classList.add('active');
        const logoutBtn = document.getElementById('logoutSidebarBtnGlobal');
        if(logoutBtn) logoutBtn.addEventListener('click',()=>{ localStorage.clear(); window.location.href='index.html'; });
    }).catch(e=>console.error(e));
</script>
<div class="app-wrapper">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="top-bar">
            <div class="page-title"><h1>Gestión de Usuarios</h1><p><i class="fas fa-users"></i> Administra los usuarios del sistema</p></div>
            <div class="date-badge" id="currentDate"></div>
        </div>
        <div class="card">
            <button class="add" id="btnAgregar"><i class="fas fa-plus"></i> Nuevo Usuario</button>
            <table id="tablaUsuarios">
                <thead><tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Rol</th><th>Acciones</th></tr></thead>
                <tbody id="tbodyUsuarios"></tbody>
            </table>
        </div>
    </main>
</div>
<div id="modalUsuario" style="display:none;" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Agregar Usuario</h2>
        <form id="usuarioForm">
            <input type="hidden" id="userId">
            <div class="form-group"><label>Nombre</label><input type="text" id="nombre" required></div>
            <div class="form-group"><label>Correo</label><input type="email" id="correo" required></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="contrasena"></div>
            <div class="form-group"><label>Rol</label><select id="rol"><option value="ADMIN">Administrador</option><option value="USER">Usuario</option></select></div>
            <button type="submit" class="add">Guardar</button>
            <button type="button" id="cancelarModal">Cancelar</button>
        </form>
    </div>
</div>
<script>
    function updateDate() { const now=new Date(); const options={weekday:'long',year:'numeric',month:'long',day:'numeric'}; let formatted=now.toLocaleDateString('es-ES',options); formatted=formatted.charAt(0).toUpperCase()+formatted.slice(1); document.getElementById('currentDate').innerHTML=`<i class="far fa-calendar-alt"></i> ${formatted}`; }
    updateDate(); setInterval(updateDate,60000);

    async function cargarUsuarios() {
        try {
            const res = await fetch('/usuarios');
            if(!res.ok) throw new Error();
            const usuarios = await res.json();
            const tbody = document.getElementById('tbodyUsuarios');
            tbody.innerHTML = '';
            usuarios.forEach(u => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = u.id;
                row.insertCell(1).innerText = u.nombre;
                row.insertCell(2).innerText = u.correo;
                row.insertCell(3).innerText = u.rol;
                const acc = row.insertCell(4);
                const editBtn = document.createElement('button'); editBtn.className='edit'; editBtn.innerHTML='<i class="fas fa-edit"></i>'; editBtn.onclick = () => editarUsuario(u);
                const delBtn = document.createElement('button'); delBtn.className='delete'; delBtn.innerHTML='<i class="fas fa-trash"></i>'; delBtn.onclick = () => eliminarUsuario(u.id);
                acc.appendChild(editBtn); acc.appendChild(delBtn);
            });
        } catch(e) { alert('Error cargando usuarios'); }
    }

    function editarUsuario(usuario) {
        document.getElementById('userId').value = usuario.id;
        document.getElementById('nombre').value = usuario.nombre;
        document.getElementById('correo').value = usuario.correo;
        document.getElementById('rol').value = usuario.rol;
        document.getElementById('contrasena').value = '';
        document.getElementById('modalTitle').innerText = 'Editar Usuario';
        document.getElementById('modalUsuario').style.display = 'flex';
    }

    async function eliminarUsuario(id) {
        if(!confirm('¿Eliminar este usuario?')) return;
        try {
            const res = await fetch(`/usuarios/${id}`, { method: 'DELETE' });
            if(res.ok) { cargarUsuarios(); } else alert('Error al eliminar');
        } catch(e) { alert('Error'); }
    }

    document.getElementById('btnAgregar').onclick = () => {
        document.getElementById('usuarioForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('modalTitle').innerText = 'Agregar Usuario';
        document.getElementById('modalUsuario').style.display = 'flex';
    };
    document.getElementById('cancelarModal').onclick = () => document.getElementById('modalUsuario').style.display = 'none';
    document.getElementById('usuarioForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('userId').value;
        const payload = {
            nombre: document.getElementById('nombre').value,
            correo: document.getElementById('correo').value,
            contrasena: document.getElementById('contrasena').value,
            rol: document.getElementById('rol').value
        };
        const url = id ? `/usuarios/${id}` : '/usuarios';
        const method = id ? 'PUT' : 'POST';
        try {
            const res = await fetch(url, { method, headers: { 'Content-Type':'application/json' }, body: JSON.stringify(payload) });
            if(res.ok) { document.getElementById('modalUsuario').style.display = 'none'; cargarUsuarios(); } else alert('Error guardando');
        } catch(e) { alert('Error'); }
    };
    cargarUsuarios();
</script>
</body>
</html>
